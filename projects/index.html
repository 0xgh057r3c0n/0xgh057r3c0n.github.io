          <div class="card-content">
            <h3>${escapeHtml(proj.name)}</h3>
            <p>${escapeHtml(proj.desc)}</p>
            <div class="card-links">
              <a href="${viewLink}" target="_blank"><i class="fab fa-github"></i> Repo</a>
              <a href="${codeLink}" target="_blank"><i class="fas fa-code-branch"></i> Source</a>
            </div>
          </div>
        </div>
      `;
    });
    grid.innerHTML = html;
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

  // Isotope integration
  let iso;
  function initIsotope() {
    if (typeof jQuery !== 'undefined' && jQuery().isotope) {
      iso = new Isotope(grid, {
        itemSelector: '.project-card',
        layoutMode: 'fitRows',
        transitionDuration: '0.4s'
      });
    } else {
      console.warn('isotope fallback');
    }
  }
  
  // filter handler
  function filterProjects(filterVal) {
    if (iso) {
      iso.arrange({ filter: filterVal === 'all' ? '*' : `[data-category="${filterVal}"]` });
    } else {
      renderCards(filterVal);
    }
    // update active button style
    document.querySelectorAll('.filter-btn').forEach(btn => {
      if(btn.getAttribute('data-filter') === filterVal) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  // event listeners for filter buttons
  function bindFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const filterVal = btn.getAttribute('data-filter');
        filterProjects(filterVal);
      });
    });
  }

  // initial load: render with Isotope
  function init() {
    buildFilters();
    renderCards('all');
    initIsotope();
    bindFilters();
    // if isotope exists, re-layout after images loaded
    if(iso) { iso.reloadItems(); iso.arrange({ filter: '*' }); }
    // fix active after re-render
    document.querySelectorAll('.filter-btn').forEach(btn => {
      if(btn.getAttribute('data-filter') === 'all') btn.classList.add('active');
    });
  }
  
  init();

  // scroll to top & menu mobile
  const scrollBtn = document.getElementById('scrollTop');
  window.addEventListener('scroll', () => {
    if(window.scrollY > 400) scrollBtn.classList.add('show');
    else scrollBtn.classList.remove('show');
  });
  scrollBtn.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));
  
  const menuToggle = document.getElementById('menu-toggle');
  const navLinks = document.querySelector('.nav-links');
  if(menuToggle) {
    menuToggle.addEventListener('click', () => navLinks.classList.toggle('show'));
  }
  document.getElementById('backToTopBtn')?.addEventListener('click', (e) => {
    e.preventDefault();
    window.scrollTo({top: 0, behavior: 'smooth'});
  });
  // active nav mock
  document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', function() {
      document.querySelectorAll('.nav-links a').forEach(l => l.classList.remove('active'));
      this.classList.add('active');
      if(window.innerWidth <= 780) navLinks.classList.remove('show');
    });
  });
</script>
</body>
</html>
